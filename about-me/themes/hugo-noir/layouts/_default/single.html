{{ define "main" }}
<div class="w-full md:w-3/4 lg:w-1/2 mx-auto px-4 py-12">
    <div class="blog-single-card max-w-3xl mx-auto p-8 border border-border-primary-light dark:border-border-primary-dark rounded-2xl">
        <h1 class="blog-single-title text-4xl font-bold mb-4">{{ .Title }}</h1>
        {{ if eq .Section "blogs" }}
            <div class="blog-single-meta flex items-center flex-wrap gap-2 mb-8">
                <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
                {{ range .Params.tags }}
                <span class="blog-single-tag px-2 py-1 rounded-md text-xs font-medium">{{ . }}</span>
                {{ end }}
            </div>
        {{ end }}

        <div class="prose prose-neutral dark:prose-invert max-w-none">
            {{ .Content }}
        </div>
    </div>
</div>
<style>
    .blog-single-card {
        background-color: #ffffff;
    }
    html.dark .blog-single-card {
        background-color: #1e1e1e;
    }

    .blog-single-title {
        color: #111827;
    }
    html.dark .blog-single-title {
        color: #f9fafb;
    }

    .blog-single-meta {
        color: #6b7280;
    }
    html.dark .blog-single-meta {
        color: #9ca3af;
    }

    .blog-single-tag {
        background-color: #f3f4f6;
        color: #374151;
    }
    html.dark .blog-single-tag {
        background-color: #374151;
        color: #e5e7eb;
    }

    /* Базовый цвет текста */
    .blog-single-card .prose {
        color: #1f2937;
    }
    html.dark .blog-single-card .prose {
        color: #e5e7eb;
    }

    /* Абзацы */
    .blog-single-card .prose p {
        margin-bottom: 1.25em;
        line-height: 1.75;
    }

    /* Заголовки */
    .blog-single-card .prose h1,
    .blog-single-card .prose h2,
    .blog-single-card .prose h3,
    .blog-single-card .prose h4,
    .blog-single-card .prose h5,
    .blog-single-card .prose h6 {
        font-weight: 700;
        line-height: 1.3;
        margin-top: 1.75em;
        margin-bottom: 0.5em;
        color: #111827;
    }
    html.dark .blog-single-card .prose h1,
    html.dark .blog-single-card .prose h2,
    html.dark .blog-single-card .prose h3,
    html.dark .blog-single-card .prose h4,
    html.dark .blog-single-card .prose h5,
    html.dark .blog-single-card .prose h6 {
        color: #f1f5f9;
    }
    .blog-single-card .prose h1 { font-size: 2em; }
    .blog-single-card .prose h2 { font-size: 1.5em; }
    .blog-single-card .prose h3 { font-size: 1.25em; }
    .blog-single-card .prose h4 { font-size: 1.1em; }

    /* Списки */
    .blog-single-card .prose ul {
        list-style-type: disc;
        padding-left: 1.75em;
        margin-bottom: 1.25em;
    }
    .blog-single-card .prose ol {
        list-style-type: decimal;
        padding-left: 1.75em;
        margin-bottom: 1.25em;
    }
    .blog-single-card .prose li {
        margin-bottom: 0.375em;
        line-height: 1.7;
    }

    /* Ссылки */
    .blog-single-card .prose a {
        color: #0284c7;
        text-decoration: underline;
        text-underline-offset: 2px;
    }
    html.dark .blog-single-card .prose a {
        color: #38bdf8;
    }

    /* Цитаты */
    .blog-single-card .prose blockquote {
        border-left: 4px solid #d1d5db;
        padding: 0.25em 0 0.25em 1em;
        margin: 1.5em 0;
        color: #6b7280;
        font-style: italic;
    }
    html.dark .blog-single-card .prose blockquote {
        border-left-color: #4b5563;
        color: #9ca3af;
    }

    /* Горизонтальный разделитель */
    .blog-single-card .prose hr {
        border-color: #e5e7eb;
        margin: 2em 0;
    }
    html.dark .blog-single-card .prose hr {
        border-color: #374151;
    }

    /* Жирный / курсив */
    .blog-single-card .prose strong { font-weight: 700; }
    .blog-single-card .prose em { font-style: italic; }

    /* Таблицы */
    .blog-single-card .prose table {
        width: 100%;
        border-collapse: collapse;
        margin: 1.25rem 0;
        font-size: 0.95em;
    }
    .blog-single-card .prose th,
    .blog-single-card .prose td {
        padding: 0.5rem 0.75rem;
        border: 1px solid #d1d5db;
        text-align: left;
    }
    html.dark .blog-single-card .prose th,
    html.dark .blog-single-card .prose td {
        border-color: #4b5563;
    }
    .blog-single-card .prose th {
        background-color: #f9fafb;
        font-weight: 600;
    }
    html.dark .blog-single-card .prose th {
        background-color: #374151;
    }

    /* Code блоки */
    .blog-single-card .prose pre {
        background-color: #1e293b;
        color: #e2e8f0;
        border-radius: 0.5rem;
        padding: 1rem 1.25rem;
        overflow-x: auto;
        margin: 1.25rem 0;
    }
    .blog-single-card .prose pre code {
        background: none;
        color: inherit;
        padding: 0;
        font-size: 0.9em;
    }

    /* Inline code */
    .blog-single-card .prose :not(pre) > code {
        background-color: #f3f4f6;
        color: #111827;
        padding: 0.15rem 0.4rem;
        border-radius: 0.25rem;
        font-size: 0.88em;
    }
    html.dark .blog-single-card .prose :not(pre) > code {
        background-color: #374151;
        color: #f3f4f6;
    }
</style>
{{ end }}
