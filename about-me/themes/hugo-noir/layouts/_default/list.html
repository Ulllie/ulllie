{{ define "main" }}
<div class="container mx-auto px-4 py-12">
    <h1 class="text-4xl font-bold mb-8 text-text-primary-light dark:text-text-primary-dark">{{ .Title }}</h1>
    <div class="space-y-6">
        {{ range .Pages }}
        <article class="blog-list-card border border-border-primary-light dark:border-border-primary-dark rounded-lg p-6">
            <h2 class="text-2xl font-semibold mb-2">
                <a href="{{ .RelPermalink }}" class="blog-list-link text-accent-light dark:text-accent-dark hover:text-text-primary-light dark:hover:text-text-primary-dark">{{ .Title }}</a>
            </h2>
            {{ if .Description }}
            <p class="blog-list-text text-text-secondary-light dark:text-text-secondary-dark">{{ .Description }}</p>
            {{ end }}
            {{ if .Date }}
            <time class="blog-list-time text-sm text-text-secondary-light dark:text-text-secondary-dark">{{ .Date.Format "January 2, 2006" }}</time>
            {{ end }}
        </article>
        {{ end }}
    </div>
</div>
<style>
    .blog-list-card {
        background-color: #ffffff;
    }
    html.dark .blog-list-card {
        background-color: #262626;
    }
    .blog-list-text,
    .blog-list-time {
        color: #4b5563;
    }
    html.dark .blog-list-text,
    html.dark .blog-list-time {
        color: #d1d5db;
    }
    .blog-list-link {
        color: #0284c7;
    }
    html.dark .blog-list-link {
        color: #0ea5e9;
    }
</style>
{{ end }}
